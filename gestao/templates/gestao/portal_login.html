<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>G IMIGRA | Acesso ao Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #2c3e50;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .btn-primary {
            background: #5e72e4;
            border: none;
            padding: 12px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold">G <span class="text-primary">IMIGRA</span></h3>
            <p class="text-muted">Portal do Cliente</p>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">E-mail Cadastrado</label>
                <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Número do Passaporte</label>
                <input type="text" name="passaporte" class="form-control" placeholder="Seu passaporte" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Entrar no Portal</button>
        </form>
    </div>
</body>

</html>
